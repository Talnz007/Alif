<!DOCTYPE html>
<html lang="en"></html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <title>ALIF - Chat about Audio </title>
</head>
<body>
    <div class="main-container">
        <div class="sidebar">
            <img src="assets/ALIIFFF.png" alt="alif" class="alif-image">
            <a href="Dashboard.html"><i class="fas fa-home"></i> Home</a>
            <a href="messages.html"><i class="fas fa-envelope"></i> Messages</a>
            <a href="progress.html"><i class="fas fa-chart-line"></i> Progress</a>
            <a href="calendar.html"><i class="fas fa-calendar-alt"></i> Calendar</a>
            <a href="settings.html"><i class="fas fa-cog"></i> Settings</a>
            <a href="about.html"><i class="fas fa-info-circle"></i>About us</a>
            <a href="index.html"><i class="fas fa-sign-out"></i>Logout</a>
        </div>
        <div class="upload-audio-container">
            <h2>Upload Audio</h2>
            
            <!-- Audio Upload Section -->
            <div class="drop-zone" id="drop-zone" onclick="document.getElementById('audio-upload').click();">
                <p>Drag & Drop your audio file here, or <span>click to upload</span></p>
                <input type="file" id="audio-upload" accept=".wav, .mp3, .aac, .flac, .aiff" onchange="handleAudioUpload(event)" style="display: none;">
            </div>
            <!-- Display Audio Info -->
            <div id="audio-info" class="audio-info">
                <p id="audio-details">No audio uploaded.</p>
                <p>only upload wav, mp3 and aiff file</p>
                <audio id="audio-player" controls style="display: none;"></audio>
            </div>
            
            <!-- Chatbot Interface -->
            <div class="chat-container">
                <h3>Chat about the Audio</h3>
                <div id="chat-messages" class="chat-messages"></div>
                <input type="text" id="chat-input" placeholder="Type your question here..." onkeypress="handleChat(event)">
                <button onclick="sendChat()">Send</button>
            </div>
        </div>
        
    </div>
    
</body>
